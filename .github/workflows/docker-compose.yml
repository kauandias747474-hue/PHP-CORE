version: '3.8'
services:
  # O Motor de Alta Performance (Laravel Octane + Swoole)
  octane-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: octane-bit-engine/app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - LARAVEL_OCTANE=1
      - OCTANE_SERVER=swoole
    volumes:
      - .:/var/www/html
    networks:
      - engine-network
    depends_on:
      - mysql-persistence
      - redis-cache

  # Persistência Rigorosa (ACID Compliance)
  mysql-persistence:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - engine-network

  # Cache de Baixa Latência (Redis Bitmaps/Streams)
  redis-cache:
    image: redis:7-alpine
    networks:
      - engine-network

  # Emulação Cloud (LocalStack para S3/SQS/SNS)
  localstack-aws:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns
    networks:
      - engine-network

networks:
  engine-network:
    driver: bridge

volumes:
  db-data:
